<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>N'avance pas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="message">N'AVANCE PAS</h1>

    <p>Tu peux encore revenir en arrière.</p>

    <p>Ne clique pas.</p>

    <button onclick="launchScreamer()">
        AVANCER
    </button>

</div>

<div id="screamer" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:9999;
">
    <img src="screamer.jpg" style="
    width:100%;
    height:100%;
    object-fit:cover;
    ">
</div>

<audio id="screamSound">
    <source src="screamer.mp3" type="audio/mpeg">
</audio>

<script>
function launchScreamer() {
    document.getElementById("screamer").style.display = "flex";

    document.getElementById("screamSound").play();

    setTimeout(() => {
        window.location.href = "page7.html";
    }, 3000);
}
</script>

</body>
</html>
