<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>N'avance pas</title>

    <style>
        body {
            background: black;
            color: red;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 150px;
        }

        button {
            font-size: 30px;
            padding: 20px 40px;
            margin-top: 50px;
            background: black;
            color: red;
            border: 2px solid red;
            cursor: pointer;
        }

        #screamer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }

        #screamer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h1>N'AVANCE PAS</h1>

<p>Tu peux encore revenir en arrière.</p>

<p>Ne clique surtout pas sur ce bouton.</p>

<button onclick="launchScreamer()">AVANCER</button>

<div id="screamer">
    <img src="screamer.jpg">
</div>

<audio id="sound">
    <source src="screamer.mp3" type="audio/mpeg">
</audio>

<script>
function launchScreamer() {

    document.getElementById("screamer").style.display = "block";

    document.getElementById("sound").play();

    setTimeout(function() {
        window.location.href = "page7.html";
    }, 3000);
}
</script>

</body>
</html>
